name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run check

      - name: No runtime dependencies
        run: npm run lint:no-deps

      - name: Test
        run: npm test

  ci-pnpm:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - run: pnpm install

      - name: Type check
        run: pnpm run check

      - name: No runtime dependencies
        run: pnpm run lint:no-deps

      - name: Test
        run: pnpm test
